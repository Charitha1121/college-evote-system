<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voting Booth | EvoteX</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #141e30; color: white; font-family: 'Poppins', sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; }
        .vote-card {
            background: rgba(40, 167, 69, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #28a745;
        }
        .btn-vote { background: #28a745; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .back-link { color: #888; text-decoration: none; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('home') }}" class="back-link">← Back to Dashboard</a>
        <h1>Live Elections</h1>
        <p>Select a club to cast your ballot. Remember, you can vote only <b>once per club</b>.</p>

        {% for club in clubs %}
        <div class="vote-card">
            <div>
                <h3 style="margin: 0;">{{ club['club'] }}</h3>
                <small>Ongoing Phase: Final Ballot</small>
            </div>
            <a href="{{ url_for('vote_club', club_name=club['club']) }}" class="btn-vote">Enter Booth</a>
        </div>
        {% else %}
        <p>There are no active club elections at this moment.</p>
        {% endfor %}
    </div>
</body>
</html>
